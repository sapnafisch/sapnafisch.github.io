<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Sapna Sinha</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FAFAF8; font-family: Georgia, serif; color: #2c2c2a; }
nav { position: fixed; top: 0; left: 0; right: 0; padding: 28px 40px; display: flex; align-items: baseline; gap: 48px; z-index: 10; background: #4a1220; }
nav a { color: #e8d8d8; text-decoration: none; font-size: 15px; letter-spacing: 0.5px; }
nav a:hover { color: #fff; }
nav .name { font-size: 18px; font-weight: 700; }
nav .connect { margin-left: auto; background: #ff8c00; color: #fff; padding: 10px 24px; font-size: 14px; font-weight: 700; border: none; letter-spacing: 0.5px; }

.contact { max-width: 560px; margin: 0 auto; padding: 140px 20px 80px; text-align: center; }
.contact h1 { font-family: 'Caveat', cursive; font-size: 36px; color: #4a1220; margin-bottom: 12px; }
.contact .sub { font-size: 16px; color: #73726c; line-height: 1.7; margin-bottom: 40px; }

.field { width: 100%; padding: 14px 16px; font-family: Georgia, serif; font-size: 15px; border: 1px solid #d4d0cc; margin-bottom: 16px; background: #fff; color: #2c2c2a; }
.field:focus { outline: none; border-color: #4a1220; }
textarea.field { height: 160px; resize: vertical; }

.send { display: inline-block; background: #ff8c00; color: #fff; padding: 14px 40px; font-size: 15px; font-weight: 700; font-family: Georgia, serif; border: none; cursor: pointer; text-decoration: none; }
.send:hover { background: #e07800; }

@media (max-width: 768px) {
  nav { padding: 18px 20px; gap: 20px; flex-wrap: wrap; }
  .contact { padding: 120px 16px 60px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="name">Sapna Sinha</a>
  <a href="research.html">Research</a>
  <a href="publications.html">Publications</a>
  <a href="blog.html">Blog</a>
  <a href="recognition.html">Recognition</a>
  <a href="contact.html" class="connect">Let's connect →</a>
</nav>

<div class="contact">
  <h1>Let's connect</h1>
  <p class="sub">I'd love to hear from you — whether it's about research, collaboration, or just a thought you'd like to share.</p>
  
  <form action="https://formspree.io/f/mnjwzprr" method="POST">
    <input type="text" name="name" placeholder="Your name" class="field" required>
    <input type="email" name="email" placeholder="Your email" class="field" required>
    <textarea name="message" placeholder="Your message" class="field" required></textarea>
    <input type="hidden" name="_subject" value="New message from your website">
    <input type="hidden" name="_next" value="https://sapnafisch.github.io/index.html">
    <button type="submit" class="send">Send →</button>
  </form>

  <p style="margin-top: 24px; font-size: 14px; color: #9c9a92;">Or email me directly at <a href="mailto:ssapna@mit.edu" style="color:#4a1220;">ssapna at mit.edu</a></p>
</div>

</body>
</html>
