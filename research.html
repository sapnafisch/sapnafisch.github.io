<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Georgia, serif; background: #FAFAF8; }

nav {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 28px 40px;
  display: flex; align-items: baseline; gap: 48px;
  z-index: 10;
  background: #4a1220;
}
nav a {
  color: #e8d8d8;
  text-decoration: none;
  font-size: 15px;
  letter-spacing: 0.5px;
}
nav a:hover { color: #fff; }
nav .name {
  font-size: 18px;
  font-weight: 700;
}

main { padding: 90px 0 40px; }

/* KDM styles */
:root {
  --bg: #FAFAF8;
  --tx: #2c2c2a;
  --tx2: #73726c;
  --tx3: #9c9a92;
  --bd: rgba(44,44,42,0.12);
}
.kdm-wrap {
  width: 100%; max-width: 1100px; margin: 0 auto;
  font-family: 'Caveat', cursive; padding: 1rem;
}
.kdm-hint {
  font-size: 15px; color: var(--tx3); margin-bottom: 10px; line-height: 1.5;
}
.kdm-main { display: flex; gap: 0; align-items: stretch; }
.kdm-sidebar {
  width: 200px; flex-shrink: 0; display: flex; flex-direction: column;
  gap: 0; padding-right: 16px; border-right: 1px solid var(--bd);
}
.kdm-li {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  transition: opacity 0.15s, background 0.15s; user-select: none;
  padding: 7px 10px; border-radius: 8px; font-size: 16px; color: var(--tx2);
}
.kdm-li:hover { background: rgba(0,0,0,0.03); }
.kdm-li.active { background: rgba(0,0,0,0.05); font-weight: 600; color: var(--tx); }
.kdm-li.dim { opacity: 0.3; }
.kdm-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.kdm-graph { flex: 1; position: relative; min-width: 0; }
canvas { display: block; width: 100%; cursor: grab; border-radius: 12px; }
canvas:active { cursor: grabbing; }
#kdm-tip {
  position: absolute; pointer-events: none; background: #fff;
  border: 1px solid var(--bd); border-radius: 10px; padding: 12px 16px;
  font-size: 15px; font-family: 'Caveat', cursive; color: var(--tx);
  max-width: 300px; display: none; z-index: 100; line-height: 1.5;
}
#kdm-tip b { font-weight: 700; font-size: 17px; display: block; margin-bottom: 2px; }
#kdm-tip .tc { font-size: 14px; margin-bottom: 6px; font-weight: 600; }
#kdm-tip .tp { font-size: 14px; color: var(--tx2); margin-top: 6px; }
.kdm-footer {
  display: flex; justify-content: flex-end; padding: 16px 0 0;
  font-family: Georgia, serif;
}
.kdm-footer a {
  color: var(--tx2); text-decoration: none; font-size: 15px;
  letter-spacing: 0.3px; transition: color 0.2s;
}
.kdm-footer a:hover { color: var(--tx); }
.kdm-footer a span { margin-left: 6px; }
@media (max-width: 700px) {
  .kdm-main { flex-direction: column; }
  .kdm-sidebar {
    width: 100%; flex-direction: row; flex-wrap: wrap;
    border-right: none; border-bottom: 1px solid var(--bd);
    padding-right: 0; padding-bottom: 8px; margin-bottom: 8px; gap: 0 4px;
  }
  .kdm-li { padding: 5px 8px; font-size: 14px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="name">Sapna Sinha</a>
  <a href="research.html">Research</a>
  <a href="publications.html">Publications</a>
  <a href="blog.html">Blog</a>
</nav>

<main>
<div class="kdm-wrap">
  <div class="kdm-hint">Node size = publication count. Hover nodes for paper details & cross-domain links. Drag to pan, scroll to zoom. Click legend to filter.</div>
  <div class="kdm-main">
    <div class="kdm-sidebar" id="kdm-leg"></div>
    <div class="kdm-graph">
      <canvas id="kdm-c"></canvas>
      <div id="kdm-tip"></div>
    </div>
  </div>
  <div class="kdm-footer">
    <a href="publications.html">Publications <span>&rarr;</span></a>
  </div>
</div>
</main>

<script>
(function() {
  var cv = document.getElementById('kdm-c');
  var cx = cv.getContext('2d');
  var tip = document.getElementById('kdm-tip');
  var DPR = devicePixelRatio || 1;
  var W, H, ASPECT = 1.0;

  function resize() {
    W = cv.parentElement.clientWidth;
    H = Math.round(W * ASPECT);
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    cx.setTransform(DPR, 0, 0, DPR, 0, 0);
    nodes.forEach(function(n) { n.px = n.x * W; n.py = n.y * H; });
  }

  var CATS = {
    'Neuro-immune engineering':       { col:'#1a1a40', fill:'rgba(26,26,64,0.10)' },
    '2D materials & nanoscience':     { col:'#c0392b', fill:'rgba(192,57,43,0.08)' },
    'Electron microscopy & imaging':  { col:'#d35400', fill:'rgba(211,84,0,0.08)' },
    'Computational & AI':             { col:'#4a148c', fill:'rgba(74,20,140,0.09)' },
    'Chemical synthesis':             { col:'#c2185b', fill:'rgba(194,24,91,0.07)' },
    'Device physics & optoelectronics':{ col:'#e65100', fill:'rgba(230,81,0,0.07)' },
    'Interdisciplinary frontier':     { col:'#666', fill:'rgba(102,102,102,0.05)' },
  };

  var CLUSTER_LABELS = [
    { text:'Neuro-immune engineering', x:0.22, y:0.04, col:'#1a1a40' },
    { text:'2D materials & nanoscience', x:0.63, y:0.84, col:'#c0392b' },
    { text:'Electron', x:0.50, y:0.64, col:'#d35400' },
    { text:'microscopy', x:0.50, y:0.67, col:'#d35400' },
    { text:'Computational & AI', x:0.04, y:0.66, col:'#4a148c' },
    { text:'Chemical synthesis', x:0.68, y:0.88, col:'#c2185b' },
    { text:'Device physics', x:0.56, y:0.10, col:'#e65100' },
  ];

  var nodes = [
    {id:'optogen',label:'Optogenetics',cat:'Neuro-immune engineering',size:6,papers:'#22,#24,#25,#27,#28',paperList:'Closed-loop neuromodulation (Sci Rob), PNS optogenetic therapies, ChR screening, CAMP protein eng.',x:.32,y:.28},
    {id:'deimmune',label:'Protein\nde-immunization',cat:'Neuro-immune engineering',size:3,papers:'#25,#28',paperList:'CAMP combinatorial engineering (ICLR), T-cell epitope reduction via policy optimization (MLSB)',x:.18,y:.18},
    {id:'immunol',label:'Immunology',cat:'Neuro-immune engineering',size:2,papers:'#24,#28',paperList:'Immune response to opsins in PNS (J Immunology), epitope immunogenicity evaluation',x:.14,y:.35},
    {id:'genether',label:'Gene therapy\n& AAV delivery',cat:'Neuro-immune engineering',size:3,papers:'#24,#27',paperList:'Long-term expression in PNS (patent), viral delivery mechanisms, intrathecal injection',x:.44,y:.15},
    {id:'neurmod',label:'Neuromodulation\n& bionics',cat:'Neuro-immune engineering',size:3,papers:'#22,#23,#24',paperList:'Fatigue-resistant muscle control (Sci Rob), biohybrid actuators (Nat BME), spinal cord interfaces',x:.48,y:.32},
    {id:'tpe',label:'Therapeutic protein\nengineering',cat:'Neuro-immune engineering',size:3,papers:'#25,#28',paperList:'CAMP platform, combinatorial engineering, de-immunization of ChR2, GAA, Factor VIII',x:.28,y:.10},
    {id:'expmicro',label:'Expansion\nmicroscopy',cat:'Neuro-immune engineering',size:1,papers:'#26',paperList:'4-fold expansion microscopy of cultured cells (JOVE)',x:.38,y:.42},
    {id:'graphene',label:'Graphene',cat:'2D materials & nanoscience',size:7,papers:'#1,#4,#11,#12,#13,#14,#16',paperList:'TEM support (Small Struct), PbI2 on graphene (Nat Comms), Gd migration (ACS Nano), hBN heterostructures, moiré twists',x:.72,y:.50},
    {id:'tmdc',label:'Transition metal\ndichalcogenides',cat:'2D materials & nanoscience',size:5,papers:'#5,#6,#8,#9,#16',paperList:'PdSe2 transformations (ACS Nano, Adv Mat), WS2 LEDs (ACS Nano), GeSe3 opto-structural coupling',x:.82,y:.38},
    {id:'phosph',label:'Phosphorene\n& black P',cat:'2D materials & nanoscience',size:2,papers:'#1,#20',paperList:'Air-stable BP heterostructures (2D Mat), single phosphorene atom chains in SWCNTs',x:.90,y:.55},
    {id:'pbi2',label:'Lead iodide\nnanostructures',cat:'2D materials & nanoscience',size:2,papers:'#11,#12',paperList:'2D PbI2 nanodisks on graphene (Nat Comms), defect dynamics and epitaxial alignment',x:.65,y:.62},
    {id:'silica2d',label:'2D silica',cat:'2D materials & nanoscience',size:1,papers:'#19',paperList:'Freestanding monolayer SiO2 synthesis and characterization',x:.88,y:.68},
    {id:'hetero',label:'0D-2D hybrid\nheterostructures',cat:'2D materials & nanoscience',size:2,papers:'#15,#16',paperList:'Nanomaterial hybrids for energy (Mat Today Adv), epitaxial vertical heterostructures (Adv Mat)',x:.75,y:.68},
    {id:'stem',label:'STEM &\nsingle-atom imaging',cat:'Electron microscopy & imaging',size:6,papers:'#4,#6,#11,#14,#17,#19',paperList:'ADF-STEM, in-situ Gd dynamics (ACS Nano), defect imaging, MAX phase reconstruction (Adv Func Mat)',x:.62,y:.38},
    {id:'eels',label:'EELS &\nspectroscopy',cat:'Electron microscopy & imaging',size:3,papers:'#14,#17,#20',paperList:'Atomic-level EELS mapping, monochromated STEM for polymer IR spectra, molecular vibrational analysis',x:.55,y:.52},
    {id:'insitu',label:'In-situ TEM',cat:'Electron microscopy & imaging',size:3,papers:'#4,#9,#14',paperList:'In-situ heating, electrical biasing, laser-irradiation growth observation',x:.68,y:.28},
    {id:'protlm',label:'Protein language\nmodels',cat:'Computational & AI',size:2,papers:'#25,#28',paperList:'CAMP framework (ICLR), policy optimization for epitope reduction (MLSB)',x:.12,y:.52},
    {id:'mlprot',label:'ML-guided\nprotein design',cat:'Computational & AI',size:2,papers:'#25,#28',paperList:'Combinatorial engineering, data-driven recombination, immune-informed design',x:.08,y:.40},
    {id:'compsim',label:'Atomistic\nsimulation',cat:'Computational & AI',size:2,papers:'#11,#8',paperList:'DFT of PbI2 (Nat Comms, with Grossman group), phase transformation modeling',x:.42,y:.62},
    {id:'fuller',label:'Endohedral\nfullerenes',cat:'Chemical synthesis',size:4,papers:'#3,#4,#10,#18',paperList:'Arc-discharge optimization (Inorganics), Gd metallofullerene dynamics, magnetic properties (book chapter)',x:.88,y:.25},
    {id:'cvd',label:'CVD synthesis',cat:'Chemical synthesis',size:3,papers:'#1,#5,#14',paperList:'hBN CVD growth (2D Mat), WS2 monolayer CVD (ACS Nano), laser-irradiated CNT growth',x:.80,y:.75},
    {id:'lpe',label:'Liquid-phase\nexfoliation',cat:'Chemical synthesis',size:2,papers:'#11,#12',paperList:'High-yield PbI2 and HfS2 nanodisk synthesis via solution chemistry',x:.68,y:.75},
    {id:'electrochem',label:'Electrocatalysis',cat:'Chemical synthesis',size:2,papers:'#17,#21',paperList:'RuO2 for PEM water electrolysis (Nat Comms sub), MAX phase oxygen evolution (Adv Func Mat)',x:.78,y:.15},
    {id:'photoswitch',label:'Photoswitching\n& phase change',cat:'Device physics & optoelectronics',size:3,papers:'#2,#7,#9',paperList:'Molecular conformation imaging (ACS Nano), opto-structural coupling (Nano Lett), laser-induced PdSe2 devices',x:.55,y:.22},
    {id:'led2d',label:'2D light-emitting\ndevices',cat:'Device physics & optoelectronics',size:2,papers:'#5,#7',paperList:'WS2 tunneling LEDs (ACS Nano), GeSe3 optoelectronics (Nano Lett)',x:.70,y:.18},
    {id:'quantum',label:'Quantum\nproperties',cat:'Device physics & optoelectronics',size:2,papers:'#3,#10',paperList:'Spin-active fullerene peapods, endohedral fullerene magnetic properties for quantum computing',x:.92,y:.38},
    {id:'nanoalz',label:'Nano for\nneurodegeneration',cat:'Interdisciplinary frontier',size:1,papers:'#29',paperList:'Integrating nanotechnologies for Alzheimer\'s — with Pinals, Langer, Boyden, Tsai',x:.48,y:.52},
  ];

  var edges = [
    ['optogen','deimmune',2],['optogen','immunol',1.5],['optogen','genether',2.5],
    ['optogen','neurmod',2.5],['optogen','expmicro',1],['deimmune','immunol',2],
    ['deimmune','protlm',2.5],['genether','neurmod',2],['genether','immunol',1],
    ['tpe','deimmune',2.5],['tpe','genether',1.5],['tpe','protlm',2],
    ['graphene','tmdc',2],['graphene','phosph',1.5],['graphene','pbi2',2.5],
    ['graphene','silica2d',1],['graphene','hetero',2],['tmdc','hetero',1.5],
    ['phosph','silica2d',0.8],['pbi2','hetero',1],
    ['stem','eels',2.5],['stem','insitu',2.5],['eels','insitu',1.5],
    ['fuller','cvd',1],['cvd','lpe',1],['fuller','electrochem',0.8],
    ['photoswitch','led2d',1.5],['photoswitch','quantum',0.8],['led2d','quantum',0.8],
    ['protlm','mlprot',2.5],['compsim','pbi2',1.5],
    ['graphene','stem',3],['graphene','cvd',2],['graphene','lpe',1.5],
    ['tmdc','stem',2],['tmdc','insitu',2],['tmdc','photoswitch',2],
    ['tmdc','cvd',1.5],['tmdc','led2d',2],
    ['fuller','stem',2],['fuller','quantum',2],
    ['stem','pbi2',2],['stem','silica2d',1.5],
    ['eels','fuller',1],['eels','compsim',1],
    ['insitu','fuller',1.5],['insitu','photoswitch',1.5],
    ['optogen','protlm',1.5],['optogen','mlprot',1],
    ['deimmune','mlprot',2],
    ['photoswitch','insitu',1.5],
    ['electrochem','stem',1],
    ['cvd','phosph',1.5],
    ['nanoalz','graphene',1,true],['nanoalz','optogen',1.5,true],
    ['nanoalz','immunol',1,true],['nanoalz','stem',0.8,true],
    ['compsim','stem',1],
  ];

  var pan = {x:0, y:0}, zoom = 1, dragging = false, ds = {x:0,y:0}, ps = {x:0,y:0};
  var hov = null, activeCat = null;
  var nm = {}; nodes.forEach(function(n){ nm[n.id] = n; });

  resize();
  window.addEventListener('resize', function(){ resize(); draw(); });

  function sp(n) { return {x: n.px*zoom+pan.x, y: n.py*zoom+pan.y}; }

  function vis(n) {
    if (!activeCat) return true;
    if (n.cat === activeCat) return true;
    return edges.some(function(e){
      if (e[0]===n.id && nm[e[1]] && nm[e[1]].cat===activeCat) return true;
      if (e[1]===n.id && nm[e[0]] && nm[e[0]].cat===activeCat) return true;
      return false;
    });
  }

  function draw() {
    cx.clearRect(0, 0, W, H);

    CLUSTER_LABELS.forEach(function(cl) {
      var lx = cl.x * W * zoom + pan.x;
      var ly = cl.y * H * zoom + pan.y;
      var dimLabel = activeCat && !Object.keys(CATS).some(function(c){ return c.indexOf(cl.text) === 0 && c === activeCat; });
      cx.font = '700 ' + Math.max(14, 20*zoom) + 'px "Caveat", cursive';
      cx.textAlign = 'left'; cx.textBaseline = 'top';
      cx.fillStyle = cl.col;
      cx.globalAlpha = dimLabel ? 0.08 : 0.45;
      cx.fillText(cl.text, lx, ly);
      cx.globalAlpha = 1;
    });

    edges.forEach(function(ed) {
      var a=ed[0], b=ed[1], w=ed[2], fut=ed[3];
      var na=nm[a], nb=nm[b]; if (!na || !nb) return;
      if (!vis(na) && !vis(nb)) return;
      var pa=sp(na), pb=sp(nb);
      var isH = hov && (a===hov.id || b===hov.id);
      var dim = hov && !isH;
      cx.beginPath(); cx.moveTo(pa.x, pa.y); cx.lineTo(pb.x, pb.y);
      if (fut) cx.setLineDash([4,4]); else cx.setLineDash([]);
      var isCross = na.cat !== nb.cat;
      var op = dim ? 0.03 : isH ? 0.5 : isCross ? 0.07 : 0.13;
      cx.strokeStyle = 'rgba(80,80,70,' + op + ')';
      cx.lineWidth = (w||1) * (isH ? 1.6 : 0.7) * zoom;
      cx.stroke(); cx.setLineDash([]);
    });

    nodes.forEach(function(n) {
      var v = vis(n); var p = sp(n);
      var r = (8 + n.size * 3.2) * zoom;
      var isH = hov === n;
      var isConn = hov && edges.some(function(e){ return (e[0]===hov.id&&e[1]===n.id)||(e[1]===hov.id&&e[0]===n.id); });
      var dim = (hov && !isH && !isConn) || (activeCat && !v);
      var col = CATS[n.cat].col; var alpha = dim ? 0.12 : isH ? 1 : 0.9;

      if (isH) {
        cx.beginPath(); cx.arc(p.x, p.y, r + 10*zoom, 0, Math.PI*2);
        cx.fillStyle = col; cx.globalAlpha = 0.08; cx.fill(); cx.globalAlpha = 1;
      }

      cx.beginPath(); cx.arc(p.x, p.y, r, 0, Math.PI*2);
      cx.globalAlpha = alpha; cx.fillStyle = CATS[n.cat].fill; cx.fill();
      cx.strokeStyle = col; cx.lineWidth = (isH ? 2.5 : 1) * zoom;
      if (n.cat === 'Interdisciplinary frontier') cx.setLineDash([3,3]);
      cx.stroke(); cx.setLineDash([]);

      if (r > 12) {
        cx.font = '700 ' + Math.max(11, 13*zoom) + 'px "Caveat", cursive';
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillStyle = col; cx.fillText(n.size, p.x, p.y);
      }
      cx.globalAlpha = 1;

      if (dim && !isConn) cx.globalAlpha = 0.15;
      var fs = Math.max(11, (n.size >= 5 ? 14 : 13) * zoom);
      cx.font = (isH ? '700 ' : '500 ') + fs + 'px "Caveat", cursive';
      cx.textAlign = 'center'; cx.textBaseline = 'top';
      cx.fillStyle = col;
      var lines = n.label.split('\n'); var lh = fs * 1.2;
      var ly = p.y + r + 5*zoom;
      lines.forEach(function(l, i) { cx.fillText(l, p.x, ly + i*lh); });
      cx.globalAlpha = 1;
    });
  }

  function hitNode(mx, my) {
    for (var i = nodes.length-1; i >= 0; i--) {
      var n = nodes[i], p = sp(n), r = (8 + n.size*3.2)*zoom + 6;
      if ((mx-p.x)*(mx-p.x) + (my-p.y)*(my-p.y) < r*r) return n;
    }
    return null;
  }

  cv.addEventListener('mousemove', function(e) {
    var r = cv.getBoundingClientRect();
    var mx = e.clientX - r.left, my = e.clientY - r.top;
    if (dragging) { pan.x = ps.x + (mx - ds.x); pan.y = ps.y + (my - ds.y); draw(); return; }
    var n = hitNode(mx, my);
    if (n !== hov) {
      hov = n; cv.style.cursor = n ? 'pointer' : 'grab';
      if (n) {
        var connNodes = edges.filter(function(e){ return e[0]===n.id || e[1]===n.id; }).map(function(e){ return e[0]===n.id ? e[1] : e[0]; });
        var cross = connNodes.filter(function(id){ return nm[id] && nm[id].cat !== n.cat; }).map(function(id){ return nm[id].label.replace(/\n/g,' '); });
        tip.innerHTML = '<b>' + n.label.replace(/\n/g,' ') + '</b>'
          + '<div class="tc" style="color:' + CATS[n.cat].col + '">' + n.cat + '</div>'
          + '<div>' + n.paperList + '</div>'
          + '<div class="tp">' + n.size + ' paper' + (n.size>1?'s':'') + ' &middot; ' + n.papers + '</div>'
          + (cross.length ? '<div class="tp">Cross-domain: ' + cross.join(', ') + '</div>' : '');
        tip.style.display = 'block';
      } else { tip.style.display = 'none'; }
      draw();
    }
    if (n) {
      tip.style.left = Math.min(e.clientX - r.left + 14, W - 310) + 'px';
      tip.style.top = Math.min(e.clientY - r.top - 10, H - 140) + 'px';
    }
  });

  cv.addEventListener('mousedown', function(e) {
    var r = cv.getBoundingClientRect(); var mx = e.clientX-r.left, my = e.clientY-r.top;
    if (!hitNode(mx, my)) { dragging = true; ds = {x:mx, y:my}; ps = {x:pan.x, y:pan.y}; }
  });
  cv.addEventListener('mouseup', function() { dragging = false; });
  cv.addEventListener('mouseleave', function() { dragging = false; hov = null; tip.style.display = 'none'; draw(); });

  cv.addEventListener('wheel', function(e) {
    e.preventDefault();
    var r = cv.getBoundingClientRect(); var mx = e.clientX-r.left, my = e.clientY-r.top;
    var oz = zoom; zoom *= e.deltaY < 0 ? 1.08 : 0.93; zoom = Math.max(0.4, Math.min(3, zoom));
    pan.x = mx - (mx - pan.x) * (zoom/oz); pan.y = my - (my - pan.y) * (zoom/oz); draw();
  }, {passive: false});

  var lastTouch = null, lastDist = null;
  cv.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      var t = e.touches[0]; var r = cv.getBoundingClientRect();
      lastTouch = {x: t.clientX-r.left, y: t.clientY-r.top}; ps = {x: pan.x, y: pan.y};
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastDist = Math.sqrt(dx*dx + dy*dy);
    }
  }, {passive: true});
  cv.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length === 1 && lastTouch) {
      var t = e.touches[0]; var r = cv.getBoundingClientRect();
      var mx = t.clientX-r.left, my = t.clientY-r.top;
      pan.x = ps.x + (mx - lastTouch.x); pan.y = ps.y + (my - lastTouch.y); draw();
    } else if (e.touches.length === 2 && lastDist) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx + dy*dy); var scale = dist / lastDist;
      var oz = zoom; zoom = Math.max(0.4, Math.min(3, zoom*scale));
      var r = cv.getBoundingClientRect();
      var cx2 = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left;
      var cy2 = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
      pan.x = cx2 - (cx2 - pan.x)*(zoom/oz); pan.y = cy2 - (cy2 - pan.y)*(zoom/oz);
      lastDist = dist; draw();
    }
  }, {passive: false});
  cv.addEventListener('touchend', function() { lastTouch = null; lastDist = null; });

  var leg = document.getElementById('kdm-leg');
  var allBtn = document.createElement('div');
  allBtn.className = 'kdm-li active'; allBtn.setAttribute('data-cat', 'all');
  allBtn.innerHTML = '<div class="kdm-dot" style="background:#888"></div><strong>All</strong>';
  allBtn.addEventListener('click', function() {
    activeCat = null;
    document.querySelectorAll('.kdm-li').forEach(function(l) { l.classList.remove('dim'); l.classList.remove('active'); });
    allBtn.classList.add('active'); draw();
  });
  leg.appendChild(allBtn);

  Object.keys(CATS).forEach(function(cat) {
    var col = CATS[cat].col; var d = document.createElement('div');
    d.className = 'kdm-li'; d.setAttribute('data-cat', cat);
    var isFrontier = cat === 'Interdisciplinary frontier';
    d.innerHTML = '<div class="kdm-dot" style="background:' + (isFrontier ? 'transparent' : col) + ';' + (isFrontier ? 'border:1.5px dashed '+col : '') + '"></div>' + cat;
    d.addEventListener('click', function() {
      if (activeCat === cat) {
        activeCat = null;
        document.querySelectorAll('.kdm-li').forEach(function(l) { l.classList.remove('dim'); l.classList.remove('active'); });
        allBtn.classList.add('active');
      } else {
        activeCat = cat;
        document.querySelectorAll('.kdm-li').forEach(function(l) {
          l.classList.remove('active');
          l.classList.toggle('dim', l.getAttribute('data-cat') !== cat && l.getAttribute('data-cat') !== 'all');
        });
        allBtn.classList.remove('active'); d.classList.add('active'); d.classList.remove('dim');
      }
      draw();
    });
    leg.appendChild(d);
  });

  draw();
})();
</script>

</body>
</html>
